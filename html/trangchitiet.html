<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm</title>
    <!-- Nhúng thêm Bootstrap 5 cho đẹp giống trang danh sách -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .product-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
        }
        .btn-buy {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container my-5">
        <!-- Nút quay lại trang danh sách sản phẩm -->
        <div class="mb-4">
            <a href="javascript:history.back()" class="text-decoration-none text-muted fw-bold">
                ← Quay lại danh sách
            </a>
        </div>

        <!-- Khung chi tiết sản phẩm -->
        <div class="product-card" id="detail"></div>
    </div>

    <script>
        // Mảng sản phẩm dùng chung để map ID
        const products = [
            {
                name: "Sting Dâu",
                price: 247200,
                description: "Nước Ngọt Có Gas Sting Dâu hương vị thơm ngon bùng nổ, giúp đập tan cơn khát và bổ sung năng lượng cho ngày dài năng động.",
                image: "../assets/images/stinhdau.jpg"
            },
            {
                name: "Sting Gold",
                price: 208000,
                description: "Nước Ngọt Có Gas Sting Gold với công thức chứa hồng sâm đem lại vị ngon độc đáo cùng nguồn năng lượng sảng khoái tức thì.",
                image: "../assets/images/nuocngotlonstinggold.jpg"
            },
            {
                name: "Pepsi",
                price: 180000,
                description: "Nước Ngọt Không Calo Pepsi mang đến trải nghiệm giải nhiệt sảng khoái cực đỉnh mà hoàn toàn không lo về đường hay calo dư thừa.",
                image: "../assets/images/pepsikhongcalothung.jpg"
            },
            {
                name: "7 Up",
                price: 247200,
                description: "Nước Ngọt Có Gas 7Up Vị Chanh thanh mát tự nhiên, ga sủi bùng nổ mang lại cảm giác cực kỳ đã khát sau mọi bữa ăn.",
                image: "../assets/images/nuocngotsodachanh7up.jpg"
            }
        ];

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const product = products[id];

        if (!product) {
            document.getElementById("detail").innerHTML = `
                <div class="text-center py-5">
                    <h2 class="text-danger">❌ Không tìm thấy sản phẩm này</h2>
                    <p class="text-muted">Vui lòng kiểm tra lại liên kết sản phẩm.</p>
                </div>`;
            throw new Error("Không tìm thấy sản phẩm");
        }

        // Render giao diện chia làm 2 cột bằng Grid Bootstrap 5
        document.getElementById("detail").innerHTML = `
            <div class="row align-items-center g-5">
                <!-- Cột bên trái: Hình ảnh -->
                <div class="col-md-5 text-center">
                    <img src="${product.image}" alt="${product.name}" class="img-fluid rounded" style="max-height: 400px; object-fit: contain;">
                </div>

                <!-- Cột bên phải: Thông tin -->
                <div class="col-md-7">
                    <span class="badge bg-danger mb-2">Sản phẩm bán chạy</span>
                    <h1 class="fw-bold text-dark mb-3">${product.name}</h1>
                    <h2 class="text-danger fw-bold mb-4">
                        ${product.price.toLocaleString('vi-VN')} VNĐ
                    </h2>
                    
                    <div class="mb-4">
                        <h5 class="fw-bold text-secondary">Mô tả sản phẩm:</h5>
                        <p class="text-muted lh-base" style="font-size: 16px;">${product.description}</p>
                    </div>

                    <div class="d-flex gap-3 align-items-center pt-3 border-top">
                        <button class="btn btn-buy">Mua ngay</button>
                        <button class="btn btn-outline-secondary px-4 py-2 rounded-pill fw-bold">Thêm vào giỏ</button>
                    </div>
                </div>
            </div>
        `;
    </script>

</body>
</html>
