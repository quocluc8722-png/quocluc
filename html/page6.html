<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Dien tich hinh chu nhat</title>
		<meta charset = "utf-8">
	</head>
		<body>
			<script>
				let d = Number(prompt("Hay nhap chieu dai hinh chu nhat la: "));
				let r = Number(prompt("Hay nhap chieu rong hinh chu nhat la: "));
				if (d<r)
					alert("Ban da nhap sai! vui long  nhap lai chieu dai lon hon chieu rong");
				else if (d==r)
					alert("TRUONG HOP DAC BIET LA HINH VUONG co dien tich la : " +d*r);
				else
					alert("Dien tich cua hinh chu nhat la: " +d*r);
			</script>
		</body>
</html>
