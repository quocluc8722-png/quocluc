<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Đăng Nhập</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <div class="container">
        <form id="frmLogin">

            <h2 id="title">Trang Đăng Kí Câu Lạc Bộ Bóng Đá</h2>

            <div class="form-group">
                <label for="txtUsername">Họ và Tên:</label>
                <input type="text" id="txtUsername" name="txtUsername">
            </div>

            <div class="form-group">
                <label for="txtPassword">Số Điện Thoại:</label>
                <input type="password" id="txtPassword" name="txtPassword">
            </div>

            <input type="submit" id="sbLogin" name="sbLogin" value="Login">
            <input type="reset" id="rsCancel" name="rsCancel" value="Cancel">

        </form>
    </div>
</body>
</html>
