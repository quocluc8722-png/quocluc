<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Nhap du lieu voi prompt() va Hiển thị với alert</title>
		<meta charset = "utf-8">
	</head>
		<body>
			<script>
				let name = prompt("Hay nhap ten cua ban: ");
				let yob = Number(prompt("Hay nhap nam sinh cua ban: "));
				
				window.alert ("Xin chao " + name +" nam 2026 cua ban"+ (2026-yob) +" tuoi roi");
			</script>
		</body>
</html>
